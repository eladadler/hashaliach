<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>השליח · WaVi — אפליקציית שליח</title>
  <style>
/* ===== WaVi · השליח — design tokens ===== */
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');

:root {
  /* gold */
  --gold:        #C9A24B;
  --gold-bright: #DCBB63;
  --gold-deep:   #A9842F;
  --gold-soft:   #F6EFDC;
  --gold-tint:   #FBF7EC;

  /* ink / charcoal */
  --ink:    #17140D;
  --ink-2:  #2C2820;
  --ink-3:  #6B665A;
  --ink-4:  #9C968A;

  /* paper */
  --paper:   #FFFFFF;
  --paper-2: #FAF8F3;
  --paper-3: #F3F0E8;
  --line:    #ECE7DC;
  --line-2:  #E2DCCD;

  /* status colors (food delivery semantics) */
  --ok:     #2E7D58;
  --ok-bg:  #E5F1EA;
  --warn:   #C08A2E;
  --warn-bg:#F7EDD7;
  --info:   #2B5B8A;
  --info-bg:#E4ECF4;
  --bad:    #B5462F;
  --bad-bg: #F6E6E1;

  --shadow-sm: 0 1px 2px rgba(23,20,13,.05), 0 2px 6px rgba(23,20,13,.04);
  --shadow-md: 0 4px 10px rgba(23,20,13,.06), 0 10px 28px rgba(23,20,13,.07);
  --shadow-lg: 0 8px 20px rgba(23,20,13,.10), 0 24px 48px rgba(23,20,13,.12);
  --shadow-gold: 0 6px 18px rgba(169,132,47,.30);

  /* map palette (theme-aware) */
  --map-land:    #E7E1D2;
  --map-block:   #F1ECE0;
  --map-street:  #FBF8F1;
  --map-street2: #F4EFE4;
  --map-park:    #DDE6CF;

  --r: 20px;
}

/* ===== Dark theme (courier driving mode) ===== */
.theme-dark {
  --ink:    #F5F1E8;
  --ink-2:  #E4DECF;
  --ink-3:  #A8A095;
  --ink-4:  #7C7669;

  --paper:   #232019;
  --paper-2: #1A1712;
  --paper-3: #2C281F;
  --line:    #332E25;
  --line-2:  #403A2E;

  --gold-soft: #3A3017;
  --gold-tint: #2A2415;

  --ok-bg:   #16291F;
  --warn-bg: #2E2614;
  --info-bg: #16222E;
  --bad-bg:  #2E1A14;

  --map-land:    #15120D;
  --map-block:   #1E1A13;
  --map-street:  #2A251C;
  --map-street2: #221E16;
  --map-park:    #1A2114;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.30), 0 2px 6px rgba(0,0,0,.24);
  --shadow-md: 0 4px 10px rgba(0,0,0,.34), 0 10px 28px rgba(0,0,0,.40);
  --shadow-lg: 0 8px 20px rgba(0,0,0,.45), 0 24px 48px rgba(0,0,0,.55);
}

* { box-sizing: border-box; }

/* Entrance animations start from hidden states; when the document is backgrounded
   the browser pauses them at frame 0 (invisible). Disable animations while hidden
   or when the user prefers reduced motion so the natural (visible) state shows. */
html.no-anim *, html.no-anim *::before, html.no-anim *::after { animation: none !important; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

html, body {
  margin: 0;
  background: #e9e6df;
  font-family: 'Heebo', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: var(--ink);
}

/* the app screen */
.screen {
  position: absolute;
  inset: 0;
  direction: rtl;
  display: flex;
  flex-direction: column;
  background: var(--paper-2);
  overflow: hidden;
}
.screen-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.screen-scroll::-webkit-scrollbar { display: none; }

/* typographic helpers */
.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

/* buttons */
.btn {
  border: none; cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-weight: 700; transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(.97); }

.btn-primary {
  background: linear-gradient(180deg, var(--gold-bright), var(--gold));
  color: var(--ink);
  box-shadow: var(--shadow-gold);
}
.btn-ink {
  background: var(--ink);
  color: #fff;
}
.btn-ghost {
  background: var(--paper);
  color: var(--ink);
  box-shadow: inset 0 0 0 1.5px var(--line-2);
}

/* placeholder image: subtle diagonal stripes + monospace label */
.ph {
  position: relative;
  background:
    repeating-linear-gradient(135deg,
      rgba(169,132,47,.07) 0 10px,
      rgba(169,132,47,.025) 10px 20px),
    var(--gold-tint);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.ph::after {
  content: attr(data-label);
  font-family: 'SF Mono', ui-monospace, Menlo, monospace;
  font-size: 10px; letter-spacing: .04em;
  color: var(--gold-deep); opacity: .65;
  text-align: center; padding: 0 10px; line-height: 1.4;
}
.ph-dark {
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,.05) 0 10px,
      rgba(255,255,255,.015) 10px 20px),
    #211d15;
}
.ph-dark::after { color: rgba(220,187,99,.7); }

/* real photo inside a placeholder; visible by default (no JS load-race),
   hidden by the no-photos toggle, removed entirely on error → striped fallback */
.ph > .ph-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover;
}
html.no-photos .ph > .ph-img { display: none !important; }

/* chips */
.chip {
  flex: 0 0 auto; cursor: pointer; -webkit-tap-highlight-color: transparent;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 15px; border-radius: 999px;
  font-size: 14px; font-weight: 600; white-space: nowrap;
  background: var(--paper); color: var(--ink-2);
  box-shadow: inset 0 0 0 1.5px var(--line-2);
  transition: all .18s ease;
}
.chip-active {
  background: var(--ink); color: #fff;
  box-shadow: none;
}

/* hide-scrollbar utility */
.hsb { scrollbar-width: none; }
.hsb::-webkit-scrollbar { display: none; }

/* Entrance animations are transform-only (never start from opacity:0 or off-screen)
   so that if the browser pauses them at frame 0 — e.g. a throttled/backgrounded
   iframe during screenshot capture — the content is still fully visible. */
@keyframes fadeUp {
  from { transform: translateY(10px); }
  to   { transform: translateY(0); }
}
@keyframes scaleIn {
  from { transform: scale(.96); }
  to   { transform: scale(1); }
}
@keyframes pulseRing {
  0%   { transform: scale(.7); opacity: .55; }
  70%  { transform: scale(2.4); opacity: 0; }
  100% { transform: scale(2.4); opacity: 0; }
}
@keyframes sheetUp {
  from { transform: translateY(30px); }
  to   { transform: translateY(0); }
}
@keyframes pushFwd {
  from { transform: translateX(-20px); }
  to   { transform: translateX(0); }
}
@keyframes pushBack {
  from { transform: translateX(20px); }
  to   { transform: translateX(0); }
}
@keyframes cuSpin { to { transform: rotate(360deg); } }
.cu-spin { animation: cuSpin .8s linear infinite; }

/* floating app-switcher pill (links back to the launcher) */
.app-switch {
  position: fixed; bottom: 18px; left: 18px; z-index: 99999;
  display: inline-flex; align-items: center; gap: 9px;
  text-decoration: none; font-family: 'Heebo', sans-serif; direction: rtl;
  background: rgba(23,20,13,.82); color: #F5F1E8;
  border: 1px solid rgba(220,187,99,.35); border-radius: 999px;
  padding: 9px 15px 9px 13px; font-size: 13.5px; font-weight: 800;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 8px 26px rgba(0,0,0,.32);
  transition: transform .18s ease, border-color .18s ease, background .18s ease;
}
.app-switch:hover { transform: translateY(-2px); border-color: rgba(220,187,99,.7); background: rgba(23,20,13,.94); }
.app-switch svg { width: 17px; height: 17px; flex: 0 0 auto; }
.app-switch .dot { width: 6px; height: 6px; border-radius: 99px; background: var(--gold-bright); }

/* ===== Full-screen responsive overrides ===== */
#root { position: fixed; inset: 0; overflow: hidden; }
.cu-root { position: fixed; inset: 0; }
.app-switch {
  bottom: max(18px, calc(env(safe-area-inset-bottom, 0px) + 8px)) !important;
  left: max(18px, env(safe-area-inset-left, 18px)) !important;
}

  </style>
  <script>
    (function () {
      function sync() { document.documentElement.classList.toggle('no-anim', document.hidden); }
      document.addEventListener('visibilitychange', sync);
      sync();
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <a class="app-switch" href="index.html" title="האפליקציות">
    <svg viewBox="0 0 24 24" fill="none" stroke="#DCBB63" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <span class="dot"></span>
    <span>האפליקציות</span>
  </a>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel">
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function Photo({ src, label, style, radius, className = '', children }) {

    <div className={'ph ' + className} data-label={label || ''} style={{ ...style, borderRadius: r }}>
      {src ? (
        <img className="ph-img" src={src} alt="" loading="lazy"
          onError={(e) => { e.currentTarget.style.display = 'none'; }} />
      ) : null}
      {children}
    </div>
  );
}

/* ---------- Icon set (clean line icons) ---------- */
function Icon({ name, size = 22, stroke = 'currentColor', fill = 'none', sw = 2, style }) {

    case 'sparkle':  return <svg {...p}><path d="M12 3l1.6 5L19 9.6 13.6 11 12 16l-1.6-5L5 9.6 10.4 8z"/></svg>;
    case 'time-fill':return <svg {...p} fill={stroke} stroke="none"><circle cx="12" cy="12" r="9"/></svg>;
    default: return null;
  }
}

/* ---------- Star rating chip ---------- */
function Rating({ value, size = 13, color = 'var(--gold-deep)', bold = true }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, color }}>

}

/* ---------- Promo / fee badge ---------- */
function Pill({ children, tone = 'soft', style }) {
  const tones = {
    soft: { background: 'var(--gold-soft)', color: 'var(--gold-deep)' },

    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,

}

function FavDot({ light }) {

Object.assign(window, { Icon, Rating, Pill, RestaurantCard, FavDot, ils, Photo });

  <script type="text/babel">
// courier-map.jsx — stylized city map for the courier app (theme-aware)

function CourierMap({ mode = 'idle', orders = [], route = null, dim = false, courierAt = null }) {
  // route: { path, progress } | null. mode: 'idle' | 'search' | 'nav'
  const defPath = "M 196 470 C 180 410, 150 380, 175 320 S 250 250, 232 200 S 280 160, 312 150";
  const path = route?.path || defPath;
  const progress = route?.progress ?? 0.4;

  return (
    <div style={{ position: 'absolute', inset: 0, overflow: 'hidden', background: 'var(--map-land)' }}>
      <svg viewBox="0 0 390 760" preserveAspectRatio="xMidYMid slice"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
        <rect x="0" y="0" width="390" height="760" fill="var(--map-land)" />
        {[[20,40,120,90],[170,30,150,110],[40,180,110,120],[200,190,150,130],[20,350,130,150],
          [210,370,150,120],[30,560,150,120],[220,560,140,130],[20,700,150,80],[210,700,150,80]].map((b,i)=>(
          <rect key={i} x={b[0]} y={b[1]} width={b[2]} height={b[3]} rx="8" fill="var(--map-block)" />
        ))}
        <rect x="170" y="320" width="150" height="120" rx="14" fill="var(--map-park)" />
        <path d="M180 430 q60 -40 130 -10" stroke="var(--map-park)" strokeWidth="6" fill="none" opacity=".6"/>
        <g stroke="var(--map-street)" strokeWidth="13" strokeLinecap="round">
          <line x1="-10" y1="160" x2="400" y2="150"/>
          <line x1="-10" y1="340" x2="400" y2="350"/>
          <line x1="-10" y1="540" x2="400" y2="535"/>
          <line x1="160" y1="-10" x2="170" y2="770"/>
          <line x1="350" y1="-10" x2="360" y2="770"/>
        </g>
        <g stroke="var(--map-street2)" strokeWidth="6" strokeLinecap="round">
          <line x1="60" y1="-10" x2="65" y2="770"/>
          <line x1="270" y1="-10" x2="275" y2="770"/>
          <line x1="-10" y1="250" x2="400" y2="245"/>
          <line x1="-10" y1="450" x2="400" y2="445"/>
        </g>

        {/* navigation route */}
        {mode === 'nav' && (
          <g>
            <path d={path} fill="none" stroke="var(--paper)" strokeWidth="9" strokeLinecap="round" opacity=".85"/>
            <path d={path} fill="none" stroke="var(--gold)" strokeWidth="5.5" strokeLinecap="round"
              strokeDasharray="520" strokeDashoffset={520 - progress * 520} style={{ transition: 'stroke-dashoffset .8s ease' }}/>
            <path d={path} fill="none" stroke="var(--gold-deep)" strokeWidth="5.5" strokeLinecap="round"
              strokeDasharray="1 14" opacity=".5"/>
            {/* destination pin (end of path) */}
            <g transform={route?.dest ? `translate(${route.dest[0]},${route.dest[1]})` : 'translate(312,150)'}>
              <path d="M0 -30 C 12 -30 20 -22 20 -10 C 20 4 0 22 0 22 C 0 22 -20 4 -20 -10 C -20 -22 -12 -30 0 -30 Z" fill="var(--ink)"/>
              <circle cy="-11" r="6.5" fill="var(--paper)"/>
            </g>
          </g>
        )}

        {/* available order pins (search/idle) */}
        {mode !== 'nav' && orders.map((o, i) => (
          <g key={i} transform={`translate(${o.x},${o.y})`} style={{ opacity: dim ? .35 : 1 }}>
            <circle r="22" fill="var(--gold)" opacity=".14">
              {!dim && <animate attributeName="r" values="14;30" dur="2.2s" begin={`${i*0.4}s`} repeatCount="indefinite"/>}
              {!dim && <animate attributeName="opacity" values=".22;0" dur="2.2s" begin={`${i*0.4}s`} repeatCount="indefinite"/>}
            </circle>
            <circle r="15" fill="var(--paper)" stroke="var(--gold)" strokeWidth="3"/>
            <text y="5" textAnchor="middle" fill="var(--gold-deep)" fontSize="13" fontWeight="800"
              fontFamily="Heebo, sans-serif">₪{o.payout}</text>
          </g>
        ))}

        {/* courier marker (you) */}
        <g transform={`translate(${courierAt ? courierAt[0] : 196},${courierAt ? courierAt[1] : 470})`}>
          <circle r="20" fill="#2B6FE0" opacity=".18">
            <animate attributeName="r" values="11;24" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values=".4;0" dur="2s" repeatCount="indefinite"/>
          </circle>
          <circle r="11" fill="#2B6FE0" stroke="#fff" strokeWidth="3.5"/>
        </g>
      </svg>
    </div>
  );
}

Object.assign(window, { CourierMap });

// courier-screens.jsx — Home (online/offline), Incoming order, Navigate, Delivered

const { useState: cuState, useEffect: cuEffect, useRef: cuRef } = React;

const DEMO_ORDER = {

        </div>

        </div>

        <div style={{ background: 'rgba(255,255,255,.07)', borderRadius: 18, padding: 16, marginTop: 16,

// courier-nav.jsx — Navigate screen (pickup → dropoff) + Delivered

const NAV_STAGES = {

  atPickup:  { label: 'באיסוף',        action: 'אספתי את ההזמנה',   next: 'toDropoff', who: 'rest' },
  toDropoff: { label: 'בדרך ללקוח',    action: 'הגעתי ליעד',        next: 'atDropoff', who: 'cust' },
  atDropoff: { label: 'במסירה',        action: 'מסרתי את ההזמנה',   next: 'done',      who: 'cust' },
};

// route geometry: courier→restaurant, then restaurant→customer
const ROUTE_PICKUP = { path: "M 196 470 C 180 410, 150 380, 175 320 S 250 250, 232 200 S 280 160, 312 150", dest: [312,150] };
const ROUTE_DROP   = { path: "M 312 150 C 300 230, 250 250, 232 320 S 150 420, 150 470 S 180 540, 150 590", dest: [150,590] };

function CourierNavigate({ order, stage, setStage, onDone }) {
  const st = NAV_STAGES[stage];
  const toPickupPhase = stage === 'toPickup' || stage === 'atPickup';
  const route = toPickupPhase ? ROUTE_PICKUP : ROUTE_DROP;
  const arrived = stage === 'atPickup' || stage === 'atDropoff';
  const isRest = st.who === 'rest';

  const [progress, setProgress] = cuState(0.15);
  cuEffect(() => {
    setProgress(arrived ? 1 : 0.55);
  }, [stage]);

  const courierAt = toPickupPhase
    ? (arrived ? [312,150] : [232,200])
    : (arrived ? [150,590] : [232,320]);

  const advance = () => {
    if (st.next === 'done') onDone();
    else setStage(st.next);
  };

  return (
    <div className="screen">
      <CourierMap mode="nav" route={{ ...route, progress }} courierAt={courierAt} />

      {/* top nav banner */}
      <div style={{ position: 'absolute', top: 'max(50px, calc(env(safe-area-inset-top, 0px) + 6px))', insetInlineStart: 14, insetInlineEnd: 14, zIndex: 6 }}>

            <div className="num" style={{ fontSize: 22, fontWeight: 900, lineHeight: 1 }}>

            <div style={{ fontSize: 13, fontWeight: 600, opacity: .7, marginTop: 3 }}>
              {isRest ? order.restArea : order.custArea}</div>
          </div>
          <span style={{ fontSize: 12, fontWeight: 800, color: 'var(--ink)', background: 'var(--gold-bright)',
            borderRadius: 999, padding: '5px 11px' }}>{st.label}</span>
        </div>
      </div>

      {/* progress chips */}
      <div style={{ position: 'absolute', top: 116, insetInlineStart: 14, insetInlineEnd: 14, zIndex: 6,
        display: 'flex', gap: 6, marginTop: 6 }}>
        {['toPickup','atPickup','toDropoff','atDropoff'].map((k, i) => {
          const order_ = ['toPickup','atPickup','toDropoff','atDropoff'];
          const cur = order_.indexOf(stage);
          return <div key={k} style={{ flex: 1, height: 5, borderRadius: 99,
            background: i <= cur ? 'var(--gold)' : 'rgba(0,0,0,.12)', transition: 'background .4s ease' }} />;
        })}
      </div>

      {/* recenter */}
      <button style={{ all: 'unset', cursor: 'pointer', position: 'absolute', bottom: 290, insetInlineEnd: 16, zIndex: 6,
        width: 46, height: 46, borderRadius: 14, background: 'var(--paper)', boxShadow: 'var(--shadow-md)',
        display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <Icon name="motorbike" size={22} stroke="var(--ink-2)" sw={2} />
      </button>

      {/* bottom action card */}
      <div style={{ position: 'absolute', bottom: 0, insetInlineStart: 0, insetInlineEnd: 0, zIndex: 7,
        background: 'var(--paper)', borderRadius: '24px 24px 0 0', boxShadow: '0 -10px 40px rgba(0,0,0,.16)',
        padding: '12px 18px', paddingBottom: 'max(30px, calc(env(safe-area-inset-bottom, 0px) + 8px))' }}>
        <div style={{ width: 40, height: 5, borderRadius: 99, background: 'var(--line-2)', margin: '0 auto 14px' }} />

        <div style={{ display: 'flex', alignItems: 'center', gap: 13 }}>
          {isRest
            ? <Photo src={order.restPhoto} label="" radius={14} style={{ width: 52, height: 52, flex: '0 0 auto' }} />
            : <div className="ph" data-label="" style={{ width: 52, height: 52, borderRadius: 999, flex: '0 0 auto',
                boxShadow: 'inset 0 0 0 2px var(--gold-soft)' }} />}
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--gold-deep)' }}>
              {isRest ? 'איסוף מ' : 'מסירה ל'}</div>
            <div style={{ fontSize: 17, fontWeight: 800, lineHeight: 1.15 }}>{isRest ? order.rest : order.cust}</div>
            <div style={{ fontSize: 12.5, color: 'var(--ink-4)', fontWeight: 600, marginTop: 2 }}>
              {isRest ? order.itemsText : order.custArea}</div>
          </div>
          <button style={{ all: 'unset', cursor: 'pointer', width: 48, height: 48, borderRadius: 999,
            background: 'var(--paper-2)', boxShadow: 'inset 0 0 0 1.5px var(--line-2)', display: 'flex',
            alignItems: 'center', justifyContent: 'center', flex: '0 0 auto' }}>
            <Icon name="phone" size={21} stroke="var(--gold-deep)" sw={2} /></button>
        </div>

        {/* order note */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 9, marginTop: 12, background: 'var(--paper-2)',
          borderRadius: 13, padding: '11px 13px' }}>
          <Icon name={isRest ? 'bag' : 'pin'} size={18} stroke="var(--ink-3)" sw={2} />
          <span style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--ink-3)' }}>
            {isRest ? 'הזמנה #' + order.id + ' · שולם מראש' : 'קומה 3, דירה 9 · להשאיר בדלת'}</span>
        </div>

        {/* swipe-style action */}
        <button className="btn btn-primary" onClick={advance} style={{ width: '100%', height: 58, borderRadius: 16,
          fontSize: 17, marginTop: 14 }}>
          {arrived && <Icon name="check" size={22} stroke="var(--ink)" sw={3} />}
          {st.action}
          {!arrived && <Icon name="back" size={20} stroke="var(--ink)" sw={2.6} style={{ transform: 'scaleX(-1)' }} />}
        </button>
      </div>
    </div>
  );
}

        </button>

  <script type="text/babel">
// courier-app.jsx — WaVi / השליח — courier (driver) app root

const { useState: caState, useEffect: caEffect, useRef: caRef, useCallback: caCb } = React;

const CT_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "כהה",
  "gold": "#C9A24B"
}/*EDITMODE-END*/;

function CourierApp() {
  const [t, setTweak] = useTweaks(CT_DEFAULTS);

  const [online, setOnline] = caState(false);
  const [view, setView] = caState('home');   // home | incoming | nav | delivered
  const [dir, setDir] = caState(1);
  const [stage, setStage] = caState('toPickup');
  const [stats, setStats] = caState({ earned: 142, deliveries: 6, hours: '4.5' });
  const incomingTimer = caRef(null);

  // palette
  caEffect(() => {
    const r = document.documentElement.style;
    r.setProperty('--gold', t.gold);
    r.setProperty('--gold-bright', `color-mix(in oklab, ${t.gold}, white 24%)`);
    r.setProperty('--gold-deep',   `color-mix(in oklab, ${t.gold}, black 28%)`);
  }, [t.gold]);

  const dark = t.theme === 'כהה';

  const go = caCb((next, d = 1) => { setDir(d); setView(next); }, []);

  // when going online, trigger an incoming order after a short search
  const scheduleIncoming = caCb(() => {
    clearTimeout(incomingTimer.current);
    incomingTimer.current = setTimeout(() => go('incoming', 1), 2200);
  }, [go]);

  caEffect(() => () => clearTimeout(incomingTimer.current), []);

  const acceptOrder = () => { setStage('toPickup'); go('nav', 1); };
  const rejectOrder = () => { go('home', -1); scheduleIncoming(); };
  const finishDelivery = () => {
    setStats(s => ({ ...s, earned: s.earned + DEMO_ORDER.payout, deliveries: s.deliveries + 1 }));
    go('delivered', 1);
  };
  const backToShift = () => { go('home', -1); scheduleIncoming(); };

  let screen;
  if (view === 'home')      screen = <CourierHome online={online} setOnline={(v) => {
                                setOnline(v); if (!v) clearTimeout(incomingTimer.current); }}
                                stats={stats} onGoIncoming={scheduleIncoming} />;
  else if (view === 'incoming') screen = <IncomingOrder order={DEMO_ORDER} onAccept={acceptOrder} onReject={rejectOrder} />;
  else if (view === 'nav')      screen = <CourierNavigate order={DEMO_ORDER} stage={stage} setStage={setStage} onDone={finishDelivery} />;
  else if (view === 'delivered') screen = <CourierDelivered order={DEMO_ORDER} onBack={backToShift} />;

  return (
    <>
      <div className={'cu-root' + (dark ? ' theme-dark' : '')} style={{ position: 'fixed', inset: 0 }}>
        <div key={view} style={{ position: 'absolute', inset: 0,
          animation: `${dir > 0 ? 'pushFwd' : 'pushBack'} .34s cubic-bezier(.2,.75,.2,1)` }}>
          {screen}
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="מראה" />
        <TweakRadio label="ערכת נושא" value={t.theme} options={['כהה', 'בהיר']}
          onChange={(v) => setTweak('theme', v)} />
        <TweakColor label="גוון הזהב" value={t.gold}
          options={['#C9A24B', '#B8902F', '#D4AF37', '#C08A3E']}
          onChange={(v) => setTweak('gold', v)} />
      </TweaksPanel>
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<CourierApp />);

  </script>

  <!-- ===== Dev error overlay — shows JS errors on blank screens ===== -->
  <script>
    (function () {
      var errors = [];
      function show() {
        var el = document.getElementById('__err');
        if (!el) {
          el = document.createElement('div');
          el.id = '__err';
          el.style.cssText = [
            'position:fixed','inset:0','z-index:999999',
            'background:rgba(20,5,5,.93)','color:#ff9090',
            'font:13px/1.5 ui-monospace,monospace','direction:ltr',
            'padding:24px 20px','overflow:auto','white-space:pre-wrap',
            'word-break:break-all'
          ].join(';');
          document.body.appendChild(el);
        }
        el.textContent = '⚠ JavaScript Error\n\n' + errors.join('\n\n---\n\n');
      }
      window.addEventListener('error', function(e) {
        // Skip opaque cross-origin errors (Script error. from CDN scripts)
        if (e.message === 'Script error.' && !e.filename && e.lineno === 0) return;
        // Skip errors with no useful info
        if (!e.message || e.message === 'Script error.') return;
        errors.push((e.message || '') + '\n' + (e.filename || '') + ':' + e.lineno + '\n' + (e.error && e.error.stack ? e.error.stack : ''));
        show();
      });
      window.addEventListener('unhandledrejection', function(e) {
        errors.push('Unhandled Promise rejection:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)));
        show();
      });
      var _ce = console.error.bind(console);
      console.error = function() {
        var msg = Array.from(arguments).map(function(a){ return typeof a === 'object' ? JSON.stringify(a,null,2) : String(a); }).join(' ');
        errors.push('[console.error] ' + msg);
        show();
        _ce.apply(console, arguments);
      };
    })();
  </script>
