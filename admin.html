<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>השליח · WaVi — מוקד התפעול</title>
  <style>
/* ===== WaVi · השליח — design tokens ===== */
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');

:root {
  /* gold */
  --gold:        #C9A24B;
  --gold-bright: #DCBB63;
  --gold-deep:   #A9842F;
  --gold-soft:   #F6EFDC;
  --gold-tint:   #FBF7EC;

  /* ink / charcoal */
  --ink:    #17140D;
  --ink-2:  #2C2820;
  --ink-3:  #6B665A;
  --ink-4:  #9C968A;

  /* paper */
  --paper:   #FFFFFF;
  --paper-2: #FAF8F3;
  --paper-3: #F3F0E8;
  --line:    #ECE7DC;
  --line-2:  #E2DCCD;

  /* status colors (food delivery semantics) */
  --ok:     #2E7D58;
  --ok-bg:  #E5F1EA;
  --warn:   #C08A2E;
  --warn-bg:#F7EDD7;
  --info:   #2B5B8A;
  --info-bg:#E4ECF4;
  --bad:    #B5462F;
  --bad-bg: #F6E6E1;

  --shadow-sm: 0 1px 2px rgba(23,20,13,.05), 0 2px 6px rgba(23,20,13,.04);
  --shadow-md: 0 4px 10px rgba(23,20,13,.06), 0 10px 28px rgba(23,20,13,.07);
  --shadow-lg: 0 8px 20px rgba(23,20,13,.10), 0 24px 48px rgba(23,20,13,.12);
  --shadow-gold: 0 6px 18px rgba(169,132,47,.30);

  /* map palette (theme-aware) */
  --map-land:    #E7E1D2;
  --map-block:   #F1ECE0;
  --map-street:  #FBF8F1;
  --map-street2: #F4EFE4;
  --map-park:    #DDE6CF;

  --r: 20px;
}

/* ===== Dark theme (courier driving mode) ===== */
.theme-dark {
  --ink:    #F5F1E8;
  --ink-2:  #E4DECF;
  --ink-3:  #A8A095;
  --ink-4:  #7C7669;

  --paper:   #232019;
  --paper-2: #1A1712;
  --paper-3: #2C281F;
  --line:    #332E25;
  --line-2:  #403A2E;

  --gold-soft: #3A3017;
  --gold-tint: #2A2415;

  --ok-bg:   #16291F;
  --warn-bg: #2E2614;
  --info-bg: #16222E;
  --bad-bg:  #2E1A14;

  --map-land:    #15120D;
  --map-block:   #1E1A13;
  --map-street:  #2A251C;
  --map-street2: #221E16;
  --map-park:    #1A2114;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.30), 0 2px 6px rgba(0,0,0,.24);
  --shadow-md: 0 4px 10px rgba(0,0,0,.34), 0 10px 28px rgba(0,0,0,.40);
  --shadow-lg: 0 8px 20px rgba(0,0,0,.45), 0 24px 48px rgba(0,0,0,.55);
}

* { box-sizing: border-box; }

/* Entrance animations start from hidden states; when the document is backgrounded
   the browser pauses them at frame 0 (invisible). Disable animations while hidden
   or when the user prefers reduced motion so the natural (visible) state shows. */
html.no-anim *, html.no-anim *::before, html.no-anim *::after { animation: none !important; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

html, body {
  margin: 0;
  background: #e9e6df;
  font-family: 'Heebo', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: var(--ink);
}

/* the app screen */
.screen {
  position: absolute;
  inset: 0;
  direction: rtl;
  display: flex;
  flex-direction: column;
  background: var(--paper-2);
  overflow: hidden;
}
.screen-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.screen-scroll::-webkit-scrollbar { display: none; }

/* typographic helpers */
.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

/* buttons */
.btn {
  border: none; cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-weight: 700; transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(.97); }

.btn-primary {
  background: linear-gradient(180deg, var(--gold-bright), var(--gold));
  color: var(--ink);
  box-shadow: var(--shadow-gold);
}
.btn-ink {
  background: var(--ink);
  color: #fff;
}
.btn-ghost {
  background: var(--paper);
  color: var(--ink);
  box-shadow: inset 0 0 0 1.5px var(--line-2);
}

/* placeholder image: subtle diagonal stripes + monospace label */
.ph {
  position: relative;
  background:
    repeating-linear-gradient(135deg,
      rgba(169,132,47,.07) 0 10px,
      rgba(169,132,47,.025) 10px 20px),
    var(--gold-tint);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.ph::after {
  content: attr(data-label);
  font-family: 'SF Mono', ui-monospace, Menlo, monospace;
  font-size: 10px; letter-spacing: .04em;
  color: var(--gold-deep); opacity: .65;
  text-align: center; padding: 0 10px; line-height: 1.4;
}
.ph-dark {
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,.05) 0 10px,
      rgba(255,255,255,.015) 10px 20px),
    #211d15;
}
.ph-dark::after { color: rgba(220,187,99,.7); }

/* real photo inside a placeholder; visible by default (no JS load-race),
   hidden by the no-photos toggle, removed entirely on error → striped fallback */
.ph > .ph-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover;
}
html.no-photos .ph > .ph-img { display: none !important; }

/* chips */
.chip {
  flex: 0 0 auto; cursor: pointer; -webkit-tap-highlight-color: transparent;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 15px; border-radius: 999px;
  font-size: 14px; font-weight: 600; white-space: nowrap;
  background: var(--paper); color: var(--ink-2);
  box-shadow: inset 0 0 0 1.5px var(--line-2);
  transition: all .18s ease;
}
.chip-active {
  background: var(--ink); color: #fff;
  box-shadow: none;
}

/* hide-scrollbar utility */
.hsb { scrollbar-width: none; }
.hsb::-webkit-scrollbar { display: none; }

/* Entrance animations are transform-only (never start from opacity:0 or off-screen)
   so that if the browser pauses them at frame 0 — e.g. a throttled/backgrounded
   iframe during screenshot capture — the content is still fully visible. */
@keyframes fadeUp {
  from { transform: translateY(10px); }
  to   { transform: translateY(0); }
}
@keyframes scaleIn {
  from { transform: scale(.96); }
  to   { transform: scale(1); }
}
@keyframes pulseRing {
  0%   { transform: scale(.7); opacity: .55; }
  70%  { transform: scale(2.4); opacity: 0; }
  100% { transform: scale(2.4); opacity: 0; }
}
@keyframes sheetUp {
  from { transform: translateY(30px); }
  to   { transform: translateY(0); }
}
@keyframes pushFwd {
  from { transform: translateX(-20px); }
  to   { transform: translateX(0); }
}
@keyframes pushBack {
  from { transform: translateX(20px); }
  to   { transform: translateX(0); }
}
@keyframes cuSpin { to { transform: rotate(360deg); } }
.cu-spin { animation: cuSpin .8s linear infinite; }

/* floating app-switcher pill (links back to the launcher) */
.app-switch {
  position: fixed; bottom: 18px; left: 18px; z-index: 99999;
  display: inline-flex; align-items: center; gap: 9px;
  text-decoration: none; font-family: 'Heebo', sans-serif; direction: rtl;
  background: rgba(23,20,13,.82); color: #F5F1E8;
  border: 1px solid rgba(220,187,99,.35); border-radius: 999px;
  padding: 9px 15px 9px 13px; font-size: 13.5px; font-weight: 800;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 8px 26px rgba(0,0,0,.32);
  transition: transform .18s ease, border-color .18s ease, background .18s ease;
}
.app-switch:hover { transform: translateY(-2px); border-color: rgba(220,187,99,.7); background: rgba(23,20,13,.94); }
.app-switch svg { width: 17px; height: 17px; flex: 0 0 auto; }
.app-switch .dot { width: 6px; height: 6px; border-radius: 99px; background: var(--gold-bright); }

/* ===== Full-screen responsive overrides ===== */
#root { position: fixed; inset: 0; overflow: hidden; }
.cu-root { position: fixed; inset: 0; }
.app-switch {
  bottom: max(18px, calc(env(safe-area-inset-bottom, 0px) + 8px)) !important;
  left: max(18px, env(safe-area-inset-left, 18px)) !important;
}

  </style>
  <script>
    (function () {
      function sync() { document.documentElement.classList.toggle('no-anim', document.hidden); }
      document.addEventListener('visibilitychange', sync);
      sync();
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <a class="app-switch" href="index.html" title="האפליקציות">
    <svg viewBox="0 0 24 24" fill="none" stroke="#DCBB63" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <span class="dot"></span>
    <span>האפליקציות</span>
  </a>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel">
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// MacOS.jsx — Simplified macOS Tahoe (Liquid Glass) window
// Based on the macOS Tahoe UI Kit. No image assets, no dependencies.
// Exports (to window): MacWindow, MacSidebar, MacSidebarItem, MacSidebarHeader, MacToolbar, MacGlass, MacTrafficLights
//
// Usage — wrap your app content in <MacWindow> to get the window chrome
// (traffic lights + titlebar). Props: width, height, title, sidebar (pass a
// <MacSidebar> element); compose MacToolbar/MacGlass inside as needed:
//
//   <MacWindow width={980} height={620} title="Documents"
//              sidebar={<MacSidebar>…</MacSidebar>}>
//     ...your app content...
//   </MacWindow>
/* END USAGE */

const MAC_FONT = '-apple-system, BlinkMacSystemFont, "SF Pro", "Helvetica Neue", sans-serif';

// ─────────────────────────────────────────────────────────────
// Liquid glass primitive — blur + white tint + inset highlight
// ─────────────────────────────────────────────────────────────
function MacGlass({ children, radius = 296, dark = false, style = {} }) {
  return (
    <div style={{ position: 'relative', borderRadius: radius, ...style }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: radius,
        background: dark ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.35)',
        backdropFilter: 'blur(40px) saturate(180%)',
        WebkitBackdropFilter: 'blur(40px) saturate(180%)',
        border: dark ? '0.5px solid rgba(255,255,255,0.12)' : '0.5px solid rgba(255,255,255,0.6)',
        boxShadow: dark
          ? '0 8px 40px rgba(0,0,0,0.2)'
          : '0 8px 40px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.4)',
      }} />
      <div style={{ position: 'relative', zIndex: 1 }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Traffic lights (14px, Tahoe colors)
// ─────────────────────────────────────────────────────────────
function MacTrafficLights({ style = {} }) {
  const dot = (bg) => (
    <div style={{
      width: 14, height: 14, borderRadius: '50%', background: bg,
      border: '0.5px solid rgba(0,0,0,0.1)',
    }} />
  );
  return (
    <div style={{ display: 'flex', gap: 9, alignItems: 'center', padding: 1, ...style }}>
      {dot('#ff736a')}{dot('#febc2e')}{dot('#19c332')}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Toolbar — title + single glass pill icon
// ─────────────────────────────────────────────────────────────
function MacToolbar({ title = 'Folder' }) {
  return (
    <div style={{
      display: 'flex', gap: 8, alignItems: 'center', padding: 8, flexShrink: 0,
    }}>
      {/* title */}
      <div style={{
        fontFamily: MAC_FONT, fontSize: 15, fontWeight: 700,
        color: 'rgba(0,0,0,0.85)', whiteSpace: 'nowrap', paddingLeft: 8,
      }}>{title}</div>
      <div style={{ flex: 1 }} />
      {/* single action */}
      <MacGlass>
        <div style={{
          width: 36, height: 36, display: 'flex',
          alignItems: 'center', justifyContent: 'center',
        }}>
          <div style={{ width: 14, height: 14, borderRadius: '50%', background: '#4c4c4c', opacity: 0.4 }} />
        </div>
      </MacGlass>
      {/* search */}
      <MacGlass>
        <div style={{
          width: 140, height: 36, display: 'flex', alignItems: 'center',
          gap: 6, padding: '0 12px',
        }}>
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <circle cx="5.5" cy="5.5" r="4" stroke="#727272" strokeWidth="1.5"/>
            <path d="M8.5 8.5l3 3" stroke="#727272" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
          <span style={{
            fontFamily: MAC_FONT, fontSize: 13, fontWeight: 500, color: '#727272',
          }}>Search</span>
        </div>
      </MacGlass>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Sidebar — frosted glass panel floating inside the window
// ─────────────────────────────────────────────────────────────
function MacSidebarItem({ label, selected = false }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 6,
      height: 24, padding: '4px 10px 4px 6px', margin: '0 10px',
      borderRadius: 8, position: 'relative',
      fontFamily: MAC_FONT, fontSize: 11, fontWeight: 500,
    }}>
      {selected && (
        <div style={{
          position: 'absolute', inset: 0, borderRadius: 8,
          background: 'rgba(0,0,0,0.11)', mixBlendMode: 'multiply',
        }} />
      )}
      <div style={{
        width: 14, height: 14, borderRadius: '50%',
        background: selected ? '#007aff' : 'rgba(0,0,0,0.4)',
        opacity: selected ? 1 : 0.5, flexShrink: 0, position: 'relative',
      }} />
      <span style={{ color: 'rgba(0,0,0,0.85)', position: 'relative' }}>{label}</span>
    </div>
  );
}

function MacSidebar({ children }) {
  return (
    <div style={{
      width: 220, height: '100%', padding: 8, flexShrink: 0,
      position: 'relative', display: 'flex', flexDirection: 'column',
    }}>
      {/* glass panel */}
      <div style={{
        position: 'absolute', inset: 8, borderRadius: 18,
        background: 'rgba(210,225,245,0.45)',
        backdropFilter: 'blur(50px) saturate(200%)',
        WebkitBackdropFilter: 'blur(50px) saturate(200%)',
        border: '0.5px solid rgba(255,255,255,0.5)',
        boxShadow: '0 8px 40px rgba(0,0,0,0.10), inset 0 1px 0 rgba(255,255,255,0.35)',
      }} />
      {/* content */}
      <div style={{
        position: 'relative', zIndex: 1, padding: '10px 0',
        display: 'flex', flexDirection: 'column', gap: 2,
      }}>
        {/* window controls + sidebar toggle */}
        <div style={{
          height: 32, display: 'flex', alignItems: 'center',
          justifyContent: 'space-between', padding: '0 10px', marginBottom: 4,
        }}>
          <MacTrafficLights />
        </div>
        {children}
      </div>
    </div>
  );
}

function MacSidebarHeader({ title }) {
  return (
    <div style={{
      padding: '14px 18px 5px',
      fontFamily: MAC_FONT, fontSize: 11, fontWeight: 700,
      color: 'rgba(0,0,0,0.5)',
    }}>{title}</div>
  );
}

// ─────────────────────────────────────────────────────────────
// Window — r:26, big shadow, sidebar + toolbar + content
// ─────────────────────────────────────────────────────────────
function MacWindow({
  width = 900, height = 600, title = 'Folder',
  sidebar, children,
}) {
  return (
    <div style={{
      width, height, borderRadius: 26, overflow: 'hidden',
      background: '#fff',
      boxShadow: '0 0 0 1px rgba(0,0,0,0.23), 0 16px 48px rgba(0,0,0,0.35)',
      display: 'flex', position: 'relative',
      fontFamily: MAC_FONT,
    }}>
      <MacSidebar>{sidebar}</MacSidebar>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
        <MacToolbar title={title} />
        <div style={{ flex: 1, overflow: 'auto', padding: '4px 8px' }}>
          {children}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, {
  MacWindow, MacSidebar, MacSidebarItem, MacSidebarHeader,
  MacToolbar, MacGlass, MacTrafficLights,
});

  </script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakRow({ label, value, children, inline = false }) {

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}

    </TweakRow>

}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ---------- Photo: real image with graceful fallback to striped placeholder ---------- */
function Photo({ src, label, style, radius, className = '', children }) {
  const r = (radius != null) ? radius : (style && style.borderRadius);
  return (
    <div className={'ph ' + className} data-label={label || ''} style={{ ...style, borderRadius: r }}>
      {src ? (
        <img className="ph-img" src={src} alt="" loading="lazy"
          onError={(e) => { e.currentTarget.style.display = 'none'; }} />
      ) : null}
      {children}
    </div>
  );
}

/* ---------- Icon set (clean line icons) ---------- */
function Icon({ name, size = 22, stroke = 'currentColor', fill = 'none', sw = 2, style }) {
  const p = { width: size, height: size, viewBox: '0 0 24 24', fill, stroke,
    strokeWidth: sw, strokeLinecap: 'round', strokeLinejoin: 'round', style };
  switch (name) {
    case 'search':   return <svg {...p}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;
    case 'pin':      return <svg {...p}><path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11z"/><circle cx="12" cy="10" r="2.6"/></svg>;
    case 'star':     return <svg {...p} fill={stroke} stroke="none"><path d="M12 3.2l2.5 5.3 5.8.7-4.3 4 1.1 5.7L12 16.9 6.9 18.9 8 13.2 3.7 9.2l5.8-.7z"/></svg>;
    case 'clock':    return <svg {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case 'plus':     return <svg {...p}><path d="M12 5v14M5 12h14"/></svg>;
    case 'minus':    return <svg {...p}><path d="M5 12h14"/></svg>;
    case 'back':     return <svg {...p}><path d="M9 5l7 7-7 7"/></svg>; /* RTL: arrow points right = back */
    case 'chev-left':return <svg {...p}><path d="M15 5l-7 7 7 7"/></svg>;
    case 'home':     return <svg {...p}><path d="M4 11.5L12 4l8 7.5"/><path d="M6 10v9h12v-9"/></svg>;
    case 'orders':   return <svg {...p}><path d="M6 3h9l4 4v14H6z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>;
    case 'user':     return <svg {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>;
    case 'heart':    return <svg {...p}><path d="M12 20s-7-4.7-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.3-7 10-7 10z"/></svg>;
    case 'heart-fill':return <svg {...p} fill={stroke} stroke="none"><path d="M12 20s-7-4.7-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.3-7 10-7 10z"/></svg>;
    case 'phone':    return <svg {...p}><path d="M4 5c0 8 7 15 15 15l2-3-4-2-2 2c-3-1.5-5.5-4-7-7l2-2-2-4z"/></svg>;
    case 'bag':      return <svg {...p}><path d="M6 8h12l-1 12H7z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>;
    case 'tag':      return <svg {...p}><path d="M3 12l8-8 9 1 1 9-8 8z"/><circle cx="15.5" cy="8.5" r="1.4" fill={stroke}/></svg>;
    case 'check':    return <svg {...p}><path d="M5 12.5l5 5 9-11"/></svg>;
    case 'sliders':  return <svg {...p}><path d="M4 6h10M18 6h2M4 12h4M12 12h8M4 18h12M18 18h2"/><circle cx="15" cy="6" r="2"/><circle cx="9" cy="12" r="2"/><circle cx="15" cy="18" r="2"/></svg>;
    case 'cart':     return <svg {...p}><path d="M3 4h2l2 12h11l2-8H6"/><circle cx="9" cy="20" r="1.4" fill={stroke}/><circle cx="18" cy="20" r="1.4" fill={stroke}/></svg>;
    case 'card':     return <svg {...p}><rect x="3" y="6" width="18" height="12" rx="2.5"/><path d="M3 10h18"/></svg>;
    case 'cash':     return <svg {...p}><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/></svg>;
    case 'bit':      return <svg {...p}><circle cx="12" cy="12" r="9"/><path d="M9 8.5h4a2 2 0 0 1 0 4H9zM9 12.5h4.4a2 2 0 0 1 0 4H9zM9 8.5v8M11 6.7v1.8M11 16.5v1.8"/></svg>;
    case 'edit':     return <svg {...p}><path d="M4 20h4l10-10-4-4L4 16z"/><path d="M13 6l4 4"/></svg>;

    case 'sparkle':  return <svg {...p}><path d="M12 3l1.6 5L19 9.6 13.6 11 12 16l-1.6-5L5 9.6 10.4 8z"/></svg>;
    case 'time-fill':return <svg {...p} fill={stroke} stroke="none"><circle cx="12" cy="12" r="9"/></svg>;
    default: return null;
  }
}

/* ---------- Star rating chip ---------- */
function Rating({ value, size = 13, color = 'var(--gold-deep)', bold = true }) {
  return (
    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, color }}>

}

function Pill({ children, tone = 'soft', style }) {
  const tones = {

    ink:  { background: 'rgba(23,20,13,.78)', color: '#fff' },

    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: '4px 9px', borderRadius: 999, fontSize: 12, fontWeight: 700,
      ...tones[tone], ...style,

}

      boxShadow: active ? 'none' : 'inset 0 0 0 1.5px var(--line-2)' }}>{children}</button>
  );
}

function Donut({ busy, idle, offline, total }) {
  const R = 52, C = 2 * Math.PI * R;
  const segs = [
    { v: busy, color: 'var(--gold)' },
    { v: idle, color: 'var(--ok)' },
    { v: offline, color: 'var(--ink-4)' },
  ];
  let off = 0;
  return (
    <div style={{ display: 'flex', justifyContent: 'center', marginTop: 16 }}>
      <div style={{ position: 'relative', width: 140, height: 140 }}>
        <svg width="140" height="140" viewBox="0 0 140 140" style={{ transform: 'rotate(-90deg)' }}>
          <circle cx="70" cy="70" r={R} fill="none" stroke="var(--paper-3)" strokeWidth="16" />
          {segs.map((s, i) => {
            const len = (s.v / total) * C;
            const el = <circle key={i} cx="70" cy="70" r={R} fill="none" stroke={s.color} strokeWidth="16"
              strokeDasharray={`${len} ${C - len}`} strokeDashoffset={-off} strokeLinecap="butt" />;
            off += len;
            return el;
          })}
        </svg>
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
          <div className="num" style={{ fontSize: 28, fontWeight: 900 }}>{total}</div>
          <div style={{ fontSize: 11.5, fontWeight: 700, color: 'var(--ink-4)' }}>שליחים</div>
        </div>
      </div>
    </div>
  );
}

function SplitRow({ c, label, v, total }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
      <span style={{ width: 10, height: 10, borderRadius: 99, background: c }} />
      <span style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--ink-2)', flex: 1 }}>{label}</span>
      <span className="num" style={{ fontSize: 14, fontWeight: 800 }}>{v}</span>
      <span className="num" style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--ink-4)', width: 38, textAlign: 'left' }}>
        {Math.round((v / total) * 100)}%</span>
    </div>
  );
}

const { useState: adState, useEffect: adEffect, useCallback: adCb } = React;

const HOME_MAP = { 'מפת תפעול': 'live', 'דאשבורד': 'overview', 'טבלת הזמנות': 'orders' };

const AD_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "בהיר",
  "homeScreen": "מפת תפעול",
  "gold": "#C9A24B"
}/*EDITMODE-END*/;

function AdminApp() {
  const [t, setTweak] = useTweaks(AD_DEFAULTS);
  const [orders, setOrders] = adState(ORDERS);
  const [couriers, setCouriers] = adState(COURIERS);
  const [view, setView] = adState(HOME_MAP[t.homeScreen] || 'live');

  // when the home-screen tweak changes, jump there
  adEffect(() => { setView(HOME_MAP[t.homeScreen] || 'live'); }, [t.homeScreen]);

  adEffect(() => {
    const r = document.documentElement.style;
    r.setProperty('--gold', t.gold);
    r.setProperty('--gold-bright', `color-mix(in oklab, ${t.gold}, white 24%)`);
    r.setProperty('--gold-deep',   `color-mix(in oklab, ${t.gold}, black 28%)`);
  }, [t.gold]);

  const dark = t.theme === 'כהה';

  const assign = adCb((orderId, courierId) => {
    if (!courierId) return;
    setOrders(prev => prev.map(o => o.id === orderId ? { ...o, status: 'assigned', courier: courierId } : o));
    setCouriers(prev => prev.map(c => c.id === courierId ? { ...c, status: 'busy', order: orderId } : c));
  }, []);

  const badges = { orders: orders.filter(o => o.status === 'unassigned').length || null };

  let screen;
  if (view === 'live')      screen = <LiveScreen orders={orders} couriers={couriers} onAssign={assign} dark={dark} />;
  else if (view === 'overview') screen = <OverviewScreen orders={orders} couriers={couriers} />;
  else if (view === 'orders')   screen = <OrdersScreen orders={orders} couriers={couriers} onAssign={assign} />;
  else if (view === 'couriers') screen = <CouriersScreen couriers={couriers} />;
  else if (view === 'restos')   screen = <RestosScreen restos={RESTOS} />;

  return (
    <AdminStage>
      <AdminWindow view={view} setView={setView} dark={dark} badges={badges}>
        <div key={view} style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0,
          animation: 'fadeUp .3s ease' }}>
          {screen}
        </div>
      </AdminWindow>

      <TweaksPanel>
        <TweakSection label="תצוגה" />
        <TweakRadio label="ערכת נושא" value={t.theme} options={['בהיר', 'כהה']}
          onChange={(v) => setTweak('theme', v)} />
        <TweakRadio label="מסך בית" value={t.homeScreen} options={['מפת תפעול', 'דאשבורד', 'טבלת הזמנות']}
          onChange={(v) => setTweak('homeScreen', v)} />
        <TweakColor label="גוון הזהב" value={t.gold}
          options={['#C9A24B', '#B8902F', '#D4AF37', '#C08A3E']}
          onChange={(v) => setTweak('gold', v)} />
      </TweaksPanel>
    </AdminStage>
  );
}

function AdminStage({ children }) {
  return (
    <div style={{ position: 'fixed', inset: 0, overflow: 'hidden' }}>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AdminApp />);

  </script>

  <!-- ===== Dev error overlay — shows JS errors on blank screens ===== -->
  <script>
    (function () {
      var errors = [];
      function show() {
        var el = document.getElementById('__err');
        if (!el) {
          el = document.createElement('div');
          el.id = '__err';
          el.style.cssText = [
            'position:fixed','inset:0','z-index:999999',
            'background:rgba(20,5,5,.93)','color:#ff9090',
            'font:13px/1.5 ui-monospace,monospace','direction:ltr',
            'padding:24px 20px','overflow:auto','white-space:pre-wrap',
            'word-break:break-all'
          ].join(';');
          document.body.appendChild(el);
        }
        el.textContent = '⚠ JavaScript Error\n\n' + errors.join('\n\n---\n\n');
      }
      window.addEventListener('error', function(e) {
        // Skip opaque cross-origin errors (Script error. from CDN scripts)
        if (e.message === 'Script error.' && !e.filename && e.lineno === 0) return;
        // Skip errors with no useful info
        if (!e.message || e.message === 'Script error.') return;
        errors.push((e.message || '') + '\n' + (e.filename || '') + ':' + e.lineno + '\n' + (e.error && e.error.stack ? e.error.stack : ''));
        show();
      });
      window.addEventListener('unhandledrejection', function(e) {
        errors.push('Unhandled Promise rejection:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)));
        show();
      });
      var _ce = console.error.bind(console);
      console.error = function() {
        var msg = Array.from(arguments).map(function(a){ return typeof a === 'object' ? JSON.stringify(a,null,2) : String(a); }).join(' ');
        errors.push('[console.error] ' + msg);
        show();
        _ce.apply(console, arguments);
      };
    })();
  </script>
</body>
</html>
