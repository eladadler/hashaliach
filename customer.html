<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>השליח · WaVi — אפליקציית לקוח</title>
  <style>
/* ===== WaVi · השליח — design tokens ===== */
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap');

:root {
  /* gold */
  --gold:        #C9A24B;
  --gold-bright: #DCBB63;
  --gold-deep:   #A9842F;
  --gold-soft:   #F6EFDC;
  --gold-tint:   #FBF7EC;

  /* ink / charcoal */
  --ink:    #17140D;
  --ink-2:  #2C2820;
  --ink-3:  #6B665A;
  --ink-4:  #9C968A;

  /* paper */
  --paper:   #FFFFFF;
  --paper-2: #FAF8F3;
  --paper-3: #F3F0E8;
  --line:    #ECE7DC;
  --line-2:  #E2DCCD;

  /* status colors (food delivery semantics) */
  --ok:     #2E7D58;
  --ok-bg:  #E5F1EA;
  --warn:   #C08A2E;
  --warn-bg:#F7EDD7;
  --info:   #2B5B8A;
  --info-bg:#E4ECF4;
  --bad:    #B5462F;
  --bad-bg: #F6E6E1;

  --shadow-sm: 0 1px 2px rgba(23,20,13,.05), 0 2px 6px rgba(23,20,13,.04);
  --shadow-md: 0 4px 10px rgba(23,20,13,.06), 0 10px 28px rgba(23,20,13,.07);
  --shadow-lg: 0 8px 20px rgba(23,20,13,.10), 0 24px 48px rgba(23,20,13,.12);
  --shadow-gold: 0 6px 18px rgba(169,132,47,.30);

  /* map palette (theme-aware) */
  --map-land:    #E7E1D2;
  --map-block:   #F1ECE0;
  --map-street:  #FBF8F1;
  --map-street2: #F4EFE4;
  --map-park:    #DDE6CF;

  --r: 20px;
}

/* ===== Dark theme (courier driving mode) ===== */
.theme-dark {
  --ink:    #F5F1E8;
  --ink-2:  #E4DECF;
  --ink-3:  #A8A095;
  --ink-4:  #7C7669;

  --paper:   #232019;
  --paper-2: #1A1712;
  --paper-3: #2C281F;
  --line:    #332E25;
  --line-2:  #403A2E;

  --gold-soft: #3A3017;
  --gold-tint: #2A2415;

  --ok-bg:   #16291F;
  --warn-bg: #2E2614;
  --info-bg: #16222E;
  --bad-bg:  #2E1A14;

  --map-land:    #15120D;
  --map-block:   #1E1A13;
  --map-street:  #2A251C;
  --map-street2: #221E16;
  --map-park:    #1A2114;

  --shadow-sm: 0 1px 2px rgba(0,0,0,.30), 0 2px 6px rgba(0,0,0,.24);
  --shadow-md: 0 4px 10px rgba(0,0,0,.34), 0 10px 28px rgba(0,0,0,.40);
  --shadow-lg: 0 8px 20px rgba(0,0,0,.45), 0 24px 48px rgba(0,0,0,.55);
}

* { box-sizing: border-box; }

/* Entrance animations start from hidden states; when the document is backgrounded
   the browser pauses them at frame 0 (invisible). Disable animations while hidden
   or when the user prefers reduced motion so the natural (visible) state shows. */
html.no-anim *, html.no-anim *::before, html.no-anim *::after { animation: none !important; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation: none !important; transition: none !important; }
}

html, body {
  margin: 0;
  background: #e9e6df;
  font-family: 'Heebo', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  color: var(--ink);
}

/* the app screen */
.screen {
  position: absolute;
  inset: 0;
  direction: rtl;
  display: flex;
  flex-direction: column;
  background: var(--paper-2);
  overflow: hidden;
}
.screen-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.screen-scroll::-webkit-scrollbar { display: none; }

/* typographic helpers */
.num { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }

/* buttons */
.btn {
  border: none; cursor: pointer; font-family: inherit;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-weight: 700; transition: transform .12s ease, box-shadow .2s ease, background .2s ease;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(.97); }

.btn-primary {
  background: linear-gradient(180deg, var(--gold-bright), var(--gold));
  color: var(--ink);
  box-shadow: var(--shadow-gold);
}
.btn-ink {
  background: var(--ink);
  color: #fff;
}
.btn-ghost {
  background: var(--paper);
  color: var(--ink);
  box-shadow: inset 0 0 0 1.5px var(--line-2);
}

/* placeholder image: subtle diagonal stripes + monospace label */
.ph {
  position: relative;
  background:
    repeating-linear-gradient(135deg,
      rgba(169,132,47,.07) 0 10px,
      rgba(169,132,47,.025) 10px 20px),
    var(--gold-tint);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.ph::after {
  content: attr(data-label);
  font-family: 'SF Mono', ui-monospace, Menlo, monospace;
  font-size: 10px; letter-spacing: .04em;
  color: var(--gold-deep); opacity: .65;
  text-align: center; padding: 0 10px; line-height: 1.4;
}
.ph-dark {
  background:
    repeating-linear-gradient(135deg,
      rgba(255,255,255,.05) 0 10px,
      rgba(255,255,255,.015) 10px 20px),
    #211d15;
}
.ph-dark::after { color: rgba(220,187,99,.7); }

/* real photo inside a placeholder; visible by default (no JS load-race),
   hidden by the no-photos toggle, removed entirely on error → striped fallback */
.ph > .ph-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover;
}
html.no-photos .ph > .ph-img { display: none !important; }

/* chips */
.chip {
  flex: 0 0 auto; cursor: pointer; -webkit-tap-highlight-color: transparent;
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 15px; border-radius: 999px;
  font-size: 14px; font-weight: 600; white-space: nowrap;
  background: var(--paper); color: var(--ink-2);
  box-shadow: inset 0 0 0 1.5px var(--line-2);
  transition: all .18s ease;
}
.chip-active {
  background: var(--ink); color: #fff;
  box-shadow: none;
}

/* hide-scrollbar utility */
.hsb { scrollbar-width: none; }
.hsb::-webkit-scrollbar { display: none; }

/* Entrance animations are transform-only (never start from opacity:0 or off-screen)
   so that if the browser pauses them at frame 0 — e.g. a throttled/backgrounded
   iframe during screenshot capture — the content is still fully visible. */
@keyframes fadeUp {
  from { transform: translateY(10px); }
  to   { transform: translateY(0); }
}
@keyframes scaleIn {
  from { transform: scale(.96); }
  to   { transform: scale(1); }
}
@keyframes pulseRing {
  0%   { transform: scale(.7); opacity: .55; }
  70%  { transform: scale(2.4); opacity: 0; }
  100% { transform: scale(2.4); opacity: 0; }
}
@keyframes sheetUp {
  from { transform: translateY(30px); }
  to   { transform: translateY(0); }
}
@keyframes pushFwd {
  from { transform: translateX(-20px); }
  to   { transform: translateX(0); }
}
@keyframes pushBack {
  from { transform: translateX(20px); }
  to   { transform: translateX(0); }
}
@keyframes cuSpin { to { transform: rotate(360deg); } }
.cu-spin { animation: cuSpin .8s linear infinite; }

/* floating app-switcher pill (links back to the launcher) */
.app-switch {
  position: fixed; bottom: 18px; left: 18px; z-index: 99999;
  display: inline-flex; align-items: center; gap: 9px;
  text-decoration: none; font-family: 'Heebo', sans-serif; direction: rtl;
  background: rgba(23,20,13,.82); color: #F5F1E8;
  border: 1px solid rgba(220,187,99,.35); border-radius: 999px;
  padding: 9px 15px 9px 13px; font-size: 13.5px; font-weight: 800;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 8px 26px rgba(0,0,0,.32);
  transition: transform .18s ease, border-color .18s ease, background .18s ease;
}
.app-switch:hover { transform: translateY(-2px); border-color: rgba(220,187,99,.7); background: rgba(23,20,13,.94); }
.app-switch svg { width: 17px; height: 17px; flex: 0 0 auto; }
.app-switch .dot { width: 6px; height: 6px; border-radius: 99px; background: var(--gold-bright); }

/* ===== Full-screen responsive overrides ===== */
/* transform: translateZ(0) creates a new containing block so fixed children
   (bottom sheets, modals) stay inside the phone column on desktop */
#root { position: fixed; inset: 0; overflow: hidden; transform: translateZ(0); }
.cu-root { position: fixed; inset: 0; transform: translateZ(0); }
.app-switch {
  bottom: max(18px, calc(env(safe-area-inset-bottom, 0px) + 8px)) !important;
  left: max(18px, env(safe-area-inset-left, 18px)) !important;
}
/* ===== Desktop: constrain to phone width ===== */
@media (min-width: 500px) {
  html, body { background: #0B0907; }
  #root, .cu-root {
    left: calc(50% - 215px) !important;
    right: auto !important;
    width: 430px;
    box-shadow: 0 0 0 1px rgba(255,255,255,.07), 0 40px 120px rgba(0,0,0,.9);
  }
  .app-switch {
    left: calc(50% - 215px + 18px) !important;
  }
}


  </style>
  <script>
    (function () {
      function sync() { document.documentElement.classList.toggle('no-anim', document.hidden); }
      document.addEventListener('visibilitychange', sync);
      sync();
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <a class="app-switch" href="index.html" title="האפליקציות">
    <svg viewBox="0 0 24 24" fill="none" stroke="#DCBB63" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    <span class="dot"></span>
    <span>האפליקציות</span>
  </a>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel">
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)

/* BEGIN USAGE */
// iOS.jsx — Simplified iOS 26 (Liquid Glass) device frame
// Based on the iOS 26 UI Kit + Figma status bar spec. No assets, no deps.
// Exports (to window): IOSDevice, IOSStatusBar, IOSNavBar, IOSGlassPill, IOSList, IOSListRow, IOSKeyboard
//
// Usage — wrap your screen content in <IOSDevice> to get the bezel, status bar
// and home indicator (props: title, dark, keyboard):
//
//   <IOSDevice title="Settings">
//     ...your screen content...
//   </IOSDevice>
//   <IOSDevice dark title="Search" keyboard>…</IOSDevice>
/* END USAGE */

// ─────────────────────────────────────────────────────────────
// Status bar
// ─────────────────────────────────────────────────────────────
function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Liquid glass pill — blur + tint + shine
// ─────────────────────────────────────────────────────────────
function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      {/* blur + tint */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      {/* shine */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Navigation bar — glass pills + large title
// ─────────────────────────────────────────────────────────────
function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {/* back chevron */}
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {/* trailing ellipsis */}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      {/* large title */}
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Grouped list (inset card, r:26) + row (52px)
// ─────────────────────────────────────────────────────────────
function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Device frame
// ─────────────────────────────────────────────────────────────
function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      {/* status bar (absolute) */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* nav + content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Keyboard — iOS 26 liquid glass
// ─────────────────────────────────────────────────────────────
function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  // special-key icons
  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {

  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px

  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;

  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

const { useState, useEffect, useRef } = React;

const ils = (n) => '₪' + n;

/* ---------- Photo: real image with graceful fallback to striped placeholder ---------- */
function Photo({ src, label, style, radius, className = '', children }) {
  const r = (radius != null) ? radius : (style && style.borderRadius);
  return (
    <div className={'ph ' + className} data-label={label || ''} style={{ ...style, borderRadius: r }}>
      {src ? (
        <img className="ph-img" src={src} alt="" loading="lazy"
          onError={(e) => { e.currentTarget.style.display = 'none'; }} />
      ) : null}
      {children}
    </div>
  );
}

/* ---------- Icon set (clean line icons) ---------- */
function Icon({ name, size = 22, stroke = 'currentColor', fill = 'none', sw = 2, style }) {
  const p = { width: size, height: size, viewBox: '0 0 24 24', fill, stroke,
    strokeWidth: sw, strokeLinecap: 'round', strokeLinejoin: 'round', style };
  switch (name) {
    case 'search':   return <svg {...p}><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>;
    case 'pin':      return <svg {...p}><path d="M12 21s7-6.3 7-11a7 7 0 1 0-14 0c0 4.7 7 11 7 11z"/><circle cx="12" cy="10" r="2.6"/></svg>;
    case 'star':     return <svg {...p} fill={stroke} stroke="none"><path d="M12 3.2l2.5 5.3 5.8.7-4.3 4 1.1 5.7L12 16.9 6.9 18.9 8 13.2 3.7 9.2l5.8-.7z"/></svg>;
    case 'clock':    return <svg {...p}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>;
    case 'plus':     return <svg {...p}><path d="M12 5v14M5 12h14"/></svg>;
    case 'minus':    return <svg {...p}><path d="M5 12h14"/></svg>;
    case 'back':     return <svg {...p}><path d="M9 5l7 7-7 7"/></svg>; /* RTL: arrow points right = back */
    case 'chev-left':return <svg {...p}><path d="M15 5l-7 7 7 7"/></svg>;
    case 'home':     return <svg {...p}><path d="M4 11.5L12 4l8 7.5"/><path d="M6 10v9h12v-9"/></svg>;
    case 'orders':   return <svg {...p}><path d="M6 3h9l4 4v14H6z"/><path d="M9 8h6M9 12h6M9 16h4"/></svg>;
    case 'user':     return <svg {...p}><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/></svg>;
    case 'heart':    return <svg {...p}><path d="M12 20s-7-4.7-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.3-7 10-7 10z"/></svg>;
    case 'heart-fill':return <svg {...p} fill={stroke} stroke="none"><path d="M12 20s-7-4.7-7-10a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.3-7 10-7 10z"/></svg>;
    case 'phone':    return <svg {...p}><path d="M4 5c0 8 7 15 15 15l2-3-4-2-2 2c-3-1.5-5.5-4-7-7l2-2-2-4z"/></svg>;
    case 'bag':      return <svg {...p}><path d="M6 8h12l-1 12H7z"/><path d="M9 8V6a3 3 0 0 1 6 0v2"/></svg>;
    case 'tag':      return <svg {...p}><path d="M3 12l8-8 9 1 1 9-8 8z"/><circle cx="15.5" cy="8.5" r="1.4" fill={stroke}/></svg>;
    case 'check':    return <svg {...p}><path d="M5 12.5l5 5 9-11"/></svg>;
    case 'sliders':  return <svg {...p}><path d="M4 6h10M18 6h2M4 12h4M12 12h8M4 18h12M18 18h2"/><circle cx="15" cy="6" r="2"/><circle cx="9" cy="12" r="2"/><circle cx="15" cy="18" r="2"/></svg>;
    case 'cart':     return <svg {...p}><path d="M3 4h2l2 12h11l2-8H6"/><circle cx="9" cy="20" r="1.4" fill={stroke}/><circle cx="18" cy="20" r="1.4" fill={stroke}/></svg>;
    case 'card':     return <svg {...p}><rect x="3" y="6" width="18" height="12" rx="2.5"/><path d="M3 10h18"/></svg>;
    case 'cash':     return <svg {...p}><rect x="3" y="6" width="18" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/></svg>;
    case 'bit':      return <svg {...p}><circle cx="12" cy="12" r="9"/><path d="M9 8.5h4a2 2 0 0 1 0 4H9zM9 12.5h4.4a2 2 0 0 1 0 4H9zM9 8.5v8M11 6.7v1.8M11 16.5v1.8"/></svg>;
    case 'edit':     return <svg {...p}><path d="M4 20h4l10-10-4-4L4 16z"/><path d="M13 6l4 4"/></svg>;
    case 'motorbike':return <svg {...p}><circle cx="6" cy="17" r="3"/><circle cx="18" cy="17" r="3"/><path d="M6 17l4-7h5l3 7M10 10l-1-3H7M15 10h4"/></svg>;
    case 'sparkle':  return <svg {...p}><path d="M12 3l1.6 5L19 9.6 13.6 11 12 16l-1.6-5L5 9.6 10.4 8z"/></svg>;
    case 'time-fill':return <svg {...p} fill={stroke} stroke="none"><circle cx="12" cy="12" r="9"/></svg>;
    default: return null;
  }
}

/* ---------- Star rating chip ---------- */
function Rating({ value, size = 13, color = 'var(--gold-deep)', bold = true }) {

    <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, color }}>

/* ---------- Promo / fee badge ---------- */
function Pill({ children, tone = 'soft', style }) {

      <Photo src={r.photo} label={r.hero} style={{ position: 'absolute', inset: 0 }} />

      <div style={{ position: 'absolute', bottom: 0, insetInlineStart: 0, insetInlineEnd: 0, padding: '14px 15px', color: '#fff' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', gap: 8 }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 19, fontWeight: 800, lineHeight: 1.1, marginBottom: 5 }}>{r.name}</div>
            <div style={{ fontSize: 13, fontWeight: 600, opacity: .92 }}>{r.cuisine.join(' · ')}</div>

          <span style={{ width: 3, height: 3, borderRadius: 9, background: 'rgba(255,255,255,.6)' }} />
          <span>{r.fee === 0 ? 'משלוח חינם' : 'משלוח ' + ils(r.fee)}</span>
          <span style={{ width: 3, height: 3, borderRadius: 9, background: 'rgba(255,255,255,.6)' }} />
          <span>{r.dist}</span>
        </div>
      </div>
    </button>
  );
}

  const [step, setStep] = React.useState(2);      // start at "picked / on the way"

  return (

  <script type="text/babel">
// app.jsx — WaVi / השליח prototype root

const { useState, useEffect, useRef, useCallback } = React;

const LAYOUT_MAP = { 'מגזין': 'magazine', 'רשת': 'grid', 'רשימה': 'list' };
const CARD_MAP   = { 'על התמונה': 'overlay', 'מתחת לתמונה': 'classic' };

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "homeLayout": "מגזין",
  "cardStyle": "על התמונה",
  "foodPhotos": true,
  "gold": "#C9A24B",
  "radius": 20
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [view, setView] = useState('home');     // home | restaurant | cart | checkout | tracking | orders | profile
  const [dir, setDir] = useState(1);
  const [restId, setRestId] = useState(null);
  const [cart, setCart] = useState({ restaurantId: null, items: [] });
  const [orderTotal, setOrderTotal] = useState(0);
  const [success, setSuccess] = useState(false);

  // apply gold palette from tweak
  useEffect(() => {
    const root = document.documentElement.style;
    root.setProperty('--gold', t.gold);
    root.setProperty('--gold-bright', `color-mix(in oklab, ${t.gold}, white 24%)`);
    root.setProperty('--gold-deep',   `color-mix(in oklab, ${t.gold}, black 28%)`);
    root.setProperty('--gold-soft',   `color-mix(in oklab, ${t.gold}, white 80%)`);
    root.setProperty('--gold-tint',   `color-mix(in oklab, ${t.gold}, white 89%)`);
  }, [t.gold]);

  // toggle real food photos vs. styled placeholders
  useEffect(() => {
    document.documentElement.classList.toggle('no-photos', !t.foodPhotos);
  }, [t.foodPhotos]);

  const go = useCallback((next, d = 1) => { setDir(d); setView(next); }, []);

  const rest = restId ? byId(restId) : (cart.restaurantId ? byId(cart.restaurantId) : null);

  const addToCart = useCallback((rId, item, delta) => {
    setCart(prev => {
      let items = prev.items;
      let restaurantId = prev.restaurantId;
      if (restaurantId && restaurantId !== rId && delta > 0) { items = []; restaurantId = rId; }
      if (!restaurantId) restaurantId = rId;
      const ex = items.find(i => i.id === item.id);
      if (ex) {
        items = items.map(i => i.id === item.id ? { ...i, qty: i.qty + delta } : i).filter(i => i.qty > 0);
      } else if (delta > 0) {
        items = [...items, { id: item.id, name: item.name, price: item.price, img: item.img, photo: item.photo, qty: delta }];
      }
      return { restaurantId: items.length ? restaurantId : null, items };
    });
  }, []);

  const layout = LAYOUT_MAP[t.homeLayout] || 'magazine';
  const cardStyle = CARD_MAP[t.cardStyle] || 'overlay';
  const radius = t.radius;

  const placeOrder = () => {
    setSuccess(true);
    setTimeout(() => { setSuccess(false); go('tracking', 1); }, 1500);
  };

  let screen;
  if (view === 'home')        screen = <HomeScreen layout={layout} cardStyle={cardStyle} radius={radius}
                                  onOpenRestaurant={(id) => { setRestId(id); go('restaurant', 1); }} />;
  else if (view === 'restaurant') screen = <RestaurantScreen r={byId(restId)} cart={cart} radius={radius}
                                  onAdd={addToCart} onBack={() => go('home', -1)} onOpenCart={() => go('cart', 1)} />;
  else if (view === 'cart')   screen = <CartScreen r={rest} cart={cart}
                                  onAdd={(id, it, d) => addToCart(rest.id, it, d)}
                                  onBack={() => go('restaurant', -1)} onCheckout={(tot) => { setOrderTotal(tot); go('checkout', 1); }} />;
  else if (view === 'checkout') screen = <CheckoutScreen r={rest} total={orderTotal}
                                  onBack={() => go('cart', -1)} onPlace={placeOrder} />;
  else if (view === 'tracking') screen = <TrackingScreen r={rest} onHome={() => { setCart({ restaurantId: null, items: [] }); go('home', -1); }} />;
  else if (view === 'orders')  screen = <OrdersScreen onTrack={() => go('tracking', 1)} onHome={() => go('home', -1)} />;
  else if (view === 'profile') screen = <ProfileScreen />;

  const showNav = ['home', 'orders', 'profile'].includes(view);
  const cartCount = cart.items.reduce((s, i) => s + i.qty, 0);

  return (
    <>
      <div style={{ position: 'fixed', inset: 0 }}>
        <div key={view} style={{ position: 'absolute', inset: 0,
          animation: `${dir > 0 ? 'pushFwd' : 'pushBack'} .34s cubic-bezier(.2,.75,.2,1)` }}>
          {screen}
        </div>
        {showNav && <BottomNav view={view} go={go} cartCount={cartCount} />}
        {success && <SuccessOverlay />}
      </div>

      <TweaksPanel>
        <TweakSection label="עמוד הבית" />
        <TweakRadio label="פריסה" value={t.homeLayout} options={['מגזין', 'רשת', 'רשימה']}
          onChange={(v) => setTweak('homeLayout', v)} />
        <TweakRadio label="כרטיס מסעדה" value={t.cardStyle} options={['על התמונה', 'מתחת לתמונה']}
          onChange={(v) => setTweak('cardStyle', v)} />
        <TweakToggle label="תמונות אוכל אמיתיות" value={t.foodPhotos}
          onChange={(v) => setTweak('foodPhotos', v)} />
        <TweakSection label="מותג" />
        <TweakColor label="גוון הזהב" value={t.gold}
          options={['#C9A24B', '#B8902F', '#D4AF37', '#C08A3E']}
          onChange={(v) => setTweak('gold', v)} />
        <TweakSlider label="עיגול פינות" value={t.radius} min={10} max={28} step={2} unit="px"
          onChange={(v) => setTweak('radius', v)} />
      </TweaksPanel>
    </>
  );
}

/* ---- Bottom navigation ---- */
function BottomNav({ view, go, cartCount }) {
  const tabs = [
    { id: 'home', icon: 'home', label: 'בית' },
    { id: 'search', icon: 'search', label: 'חיפוש' },
    { id: 'orders', icon: 'orders', label: 'הזמנות' },
    { id: 'profile', icon: 'user', label: 'פרופיל' },
  ];
  return (
    <div style={{ position: 'absolute', bottom: 0, insetInlineStart: 0, insetInlineEnd: 0, zIndex: 30,
      background: 'rgba(255,255,255,.94)', backdropFilter: 'blur(14px)', borderTop: '1px solid var(--line)',
      paddingBottom: 'max(8px, env(safe-area-inset-bottom, 0px))', paddingTop: 9, display: 'flex' }}>
      {tabs.map(tab => {
        const active = view === tab.id || (tab.id === 'home' && view === 'home');
        return (
          <button key={tab.id} onClick={() => go(tab.id === 'search' ? 'home' : tab.id, tab.id === 'home' ? -1 : 1)}
            style={{ all: 'unset', cursor: 'pointer', flex: 1, display: 'flex', flexDirection: 'column',
              alignItems: 'center', gap: 4, position: 'relative' }}>
            <div style={{ position: 'relative' }}>
              <Icon name={tab.icon} size={24} stroke={active ? 'var(--gold-deep)' : 'var(--ink-4)'} sw={active ? 2.4 : 2} />
              {tab.id === 'orders' && cartCount > 0 && (
                <span className="num" style={{ position: 'absolute', top: -5, insetInlineEnd: -8, minWidth: 16, height: 16,
                  borderRadius: 9, background: 'var(--gold)', color: 'var(--ink)', fontSize: 10.5, fontWeight: 800,
                  display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 3px' }}>{cartCount}</span>
              )}
            </div>
            <span style={{ fontSize: 11, fontWeight: active ? 800 : 600, color: active ? 'var(--ink)' : 'var(--ink-4)' }}>{tab.label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ---- Order placed celebration ---- */

      backdropFilter: 'blur(4px)', display: 'flex', alignItems: 'center', justifyContent: 'center',
      animation: 'scaleIn .25s ease' }}>

}

  <!-- ===== Dev error overlay — shows JS errors on blank screens ===== -->
  <script>
    (function () {
      var errors = [];
      function show() {
        var el = document.getElementById('__err');
        if (!el) {
          el = document.createElement('div');
          el.id = '__err';
          el.style.cssText = [
            'position:fixed','inset:0','z-index:999999',
            'background:rgba(20,5,5,.93)','color:#ff9090',
            'font:13px/1.5 ui-monospace,monospace','direction:ltr',
            'padding:24px 20px','overflow:auto','white-space:pre-wrap',
            'word-break:break-all'
          ].join(';');
          document.body.appendChild(el);
        }
        el.textContent = '⚠ JavaScript Error\n\n' + errors.join('\n\n---\n\n');
      }
      window.addEventListener('error', function(e) {
        // Skip opaque cross-origin errors (Script error. from CDN scripts)
        if (e.message === 'Script error.' && !e.filename && e.lineno === 0) return;
        // Skip errors with no useful info
        if (!e.message || e.message === 'Script error.') return;
        errors.push((e.message || '') + '\n' + (e.filename || '') + ':' + e.lineno + '\n' + (e.error && e.error.stack ? e.error.stack : ''));
        show();
      });
      window.addEventListener('unhandledrejection', function(e) {
        errors.push('Unhandled Promise rejection:\n' + (e.reason && e.reason.stack ? e.reason.stack : String(e.reason)));
        show();
      });
      var _ce = console.error.bind(console);
      console.error = function() {
        var msg = Array.from(arguments).map(function(a){ return typeof a === 'object' ? JSON.stringify(a,null,2) : String(a); }).join(' ');
        errors.push('[console.error] ' + msg);
        show();
        _ce.apply(console, arguments);
      };
    })();
  </script>
